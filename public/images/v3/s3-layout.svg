<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="S3 三层数据隔离布局">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" fill="#0f172a" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="28" font-weight="700">S3 三层数据隔离 · Three-layer S3 Isolation</text>

  <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="20" fill="#0f172a">
    <g transform="translate(140,150)">
      <rect width="920" height="100" rx="14" fill="#f0f9ff" stroke="#0ea5e9"/>
      <text x="40" y="42" font-weight="700">{avatarId}/{key}</text>
      <text x="40" y="74" font-size="16" fill="#0369a1" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">分身级模板（admin 可写、所有用户只读） · Template (admin write, users read-only)</text>
    </g>
    <g transform="translate(140,290)">
      <rect width="920" height="100" rx="14" fill="#eef2ff" stroke="#6366f1"/>
      <text x="40" y="42" font-weight="700">{avatarId}/shared/{key}</text>
      <text x="40" y="74" font-size="16" fill="#4338ca" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">shared 模式的运行时备份 · Runtime backup for shared mode</text>
    </g>
    <g transform="translate(140,430)">
      <rect width="920" height="100" rx="14" fill="#faf5ff" stroke="#a855f7"/>
      <text x="40" y="42" font-weight="700">{avatarId}/per-user/{userId}/{key}</text>
      <text x="40" y="74" font-size="16" fill="#7e22ce" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">per_user 模式下每个用户的独立备份 · Per-user runtime backup</text>
    </g>
  </g>

  <text x="600" y="588" text-anchor="middle" fill="#64748b" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16">三层 fallback 读取 · 网关自动改写读写路径 · 一键重置全部用户实例</text>
</svg>
