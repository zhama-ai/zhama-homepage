<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="per_user 调度示意图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" fill="#0f172a" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="28" font-weight="700">per_user 独享实例 · Per-user Dedicated Instances</text>

  <g font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#1e293b">
    <g transform="translate(80,140)">
      <rect width="160" height="60" rx="12" fill="#fff" stroke="#94a3b8"/>
      <text x="80" y="38" text-anchor="middle">用户 A · User A</text>
    </g>
    <g transform="translate(80,260)">
      <rect width="160" height="60" rx="12" fill="#fff" stroke="#94a3b8"/>
      <text x="80" y="38" text-anchor="middle">用户 B · User B</text>
    </g>
    <g transform="translate(80,380)">
      <rect width="160" height="60" rx="12" fill="#fff" stroke="#94a3b8"/>
      <text x="80" y="38" text-anchor="middle">用户 C · User C</text>
    </g>

    <g transform="translate(440,260)">
      <rect width="240" height="100" rx="14" fill="url(#brand)"/>
      <text x="120" y="44" text-anchor="middle" fill="#fff" font-weight="700">per_user 调度器</text>
      <text x="120" y="74" text-anchor="middle" fill="#e0e7ff" font-size="14">per_user Scheduler</text>
    </g>

    <g transform="translate(840,140)">
      <rect width="280" height="80" rx="12" fill="#fff" stroke="#22d3ee"/>
      <text x="140" y="32" text-anchor="middle" font-weight="600">A 独立容器</text>
      <text x="140" y="58" text-anchor="middle" font-size="14" fill="#0369a1">S3: per-user/A/...</text>
    </g>
    <g transform="translate(840,270)">
      <rect width="280" height="80" rx="12" fill="#fff" stroke="#6366f1"/>
      <text x="140" y="32" text-anchor="middle" font-weight="600">B 独立容器</text>
      <text x="140" y="58" text-anchor="middle" font-size="14" fill="#4f46e5">S3: per-user/B/...</text>
    </g>
    <g transform="translate(840,400)">
      <rect width="280" height="80" rx="12" fill="#fff" stroke="#a855f7"/>
      <text x="140" y="32" text-anchor="middle" font-weight="600">C 独立容器</text>
      <text x="140" y="58" text-anchor="middle" font-size="14" fill="#9333ea">S3: per-user/C/...</text>
    </g>
  </g>

  <g stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="240" y1="170" x2="430" y2="280"/>
    <line x1="240" y1="290" x2="430" y2="310"/>
    <line x1="240" y1="410" x2="430" y2="340"/>
    <line x1="690" y1="280" x2="830" y2="180"/>
    <line x1="690" y1="310" x2="830" y2="310"/>
    <line x1="690" y1="340" x2="830" y2="440"/>
  </g>

  <text x="600" y="570" text-anchor="middle" fill="#64748b" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16">空闲 5 分钟优雅回收 · 状态 flush 到 S3 · 下次秒级唤醒</text>
</svg>
