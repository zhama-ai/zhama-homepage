<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Tego OS v3.0.0 — One avatar, a whole team">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="320" r="380" fill="url(#halo)"/>
  <text x="600" y="180" text-anchor="middle" fill="#94a3b8" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" letter-spacing="6">TEGO OS v3.0.0</text>
  <text x="600" y="290" text-anchor="middle" fill="url(#brand)" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="64" font-weight="800">One avatar, a whole team</text>
  <text x="600" y="370" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="28" font-weight="500">同一个数字分身，可以让一群人放心地、互不打扰地一起用</text>
  <g transform="translate(320,460)" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#e2e8f0">
    <rect x="0" y="0" width="140" height="44" rx="22" fill="#0ea5e9" fill-opacity="0.18" stroke="#22d3ee" stroke-opacity="0.4"/>
    <text x="70" y="28" text-anchor="middle">per_user</text>
    <rect x="160" y="0" width="170" height="44" rx="22" fill="#6366f1" fill-opacity="0.18" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="245" y="28" text-anchor="middle">S3 isolation</text>
    <rect x="350" y="0" width="200" height="44" rx="22" fill="#a855f7" fill-opacity="0.18" stroke="#a855f7" stroke-opacity="0.4"/>
    <text x="450" y="28" text-anchor="middle">BusinessMonitor</text>
  </g>
</svg>
