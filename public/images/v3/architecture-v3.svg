<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Tego OS v3.0.0 架构总览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="600" y="50" text-anchor="middle" fill="#0f172a" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="26" font-weight="700">Tego OS v3.0.0 架构总览 · Architecture Overview</text>

  <g font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" fill="#0f172a">
    <g>
      <rect x="60"  y="100" width="220" height="64" rx="10" fill="#fff" stroke="#0ea5e9"/>
      <text x="170" y="130" text-anchor="middle" font-weight="700">Web Console</text>
      <text x="170" y="152" text-anchor="middle" font-size="12" fill="#64748b">ai-studio · dashboard</text>
    </g>
    <g>
      <rect x="305" y="100" width="220" height="64" rx="10" fill="#fff" stroke="#0ea5e9"/>
      <text x="415" y="130" text-anchor="middle" font-weight="700">Desktop App</text>
      <text x="415" y="152" text-anchor="middle" font-size="12" fill="#64748b">Tauri · macOS / Win / Linux</text>
    </g>
    <g>
      <rect x="550" y="100" width="220" height="64" rx="10" fill="#fff" stroke="#0ea5e9"/>
      <text x="660" y="130" text-anchor="middle" font-weight="700">Mini Chat</text>
      <text x="660" y="152" text-anchor="middle" font-size="12" fill="#64748b">always-on-top floating</text>
    </g>
    <g>
      <rect x="795" y="100" width="345" height="64" rx="10" fill="#fff" stroke="#0ea5e9"/>
      <text x="967" y="130" text-anchor="middle" font-weight="700">Channels</text>
      <text x="967" y="152" text-anchor="middle" font-size="12" fill="#64748b">WeCom · DingTalk · Lark · Slack · Web</text>
    </g>

    <rect x="60" y="210" width="1080" height="56" rx="10" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9"/>
    <text x="600" y="244" text-anchor="middle" font-weight="700" fill="#0369a1">Server · Gateway · JWT (instanceUserId) · Quota Guardrails · Stale-Lock Cleanup</text>

    <g>
      <rect x="60"  y="310" width="320" height="80" rx="10" fill="#fff" stroke="#6366f1"/>
      <text x="220" y="340" text-anchor="middle" font-weight="700">Shared Pool</text>
      <text x="220" y="362" text-anchor="middle" font-size="12" fill="#64748b">instanceMode = shared</text>
      <text x="220" y="380" text-anchor="middle" font-size="12" fill="#64748b">单实例多用户共享会话</text>
    </g>
    <g>
      <rect x="410" y="310" width="320" height="80" rx="10" fill="#fff" stroke="#a855f7"/>
      <text x="570" y="340" text-anchor="middle" font-weight="700">per_user Scheduler</text>
      <text x="570" y="362" text-anchor="middle" font-size="12" fill="#64748b">每用户独立容器 + 独立 S3 命名空间</text>
      <text x="570" y="380" text-anchor="middle" font-size="12" fill="#64748b">空闲 5 分钟优雅回收</text>
    </g>
    <g>
      <rect x="760" y="310" width="380" height="80" rx="10" fill="#fff" stroke="#10b981"/>
      <text x="950" y="340" text-anchor="middle" font-weight="700">Skills · Templates · Memory</text>
      <text x="950" y="362" text-anchor="middle" font-size="12" fill="#64748b">16 个 Tego 模板技能</text>
      <text x="950" y="380" text-anchor="middle" font-size="12" fill="#64748b">模板单一权威 · 三层 fallback 读取</text>
    </g>

    <g>
      <rect x="60"  y="430" width="240" height="80" rx="10" fill="#fff" stroke="#94a3b8"/>
      <text x="180" y="462" text-anchor="middle" font-weight="700">PostgreSQL</text>
      <text x="180" y="484" text-anchor="middle" font-size="12" fill="#64748b">租户 / 分身 / 实例元数据</text>
    </g>
    <g>
      <rect x="320" y="430" width="240" height="80" rx="10" fill="#fff" stroke="#94a3b8"/>
      <text x="440" y="462" text-anchor="middle" font-weight="700">Redis</text>
      <text x="440" y="484" text-anchor="middle" font-size="12" fill="#64748b">配额 · 心跳 · stale 锁</text>
    </g>
    <g>
      <rect x="580" y="430" width="280" height="80" rx="10" fill="#fff" stroke="#94a3b8"/>
      <text x="720" y="462" text-anchor="middle" font-weight="700">S3 Object Store</text>
      <text x="720" y="484" text-anchor="middle" font-size="12" fill="#64748b">template / shared / per-user 三层</text>
    </g>
    <g>
      <rect x="880" y="430" width="260" height="80" rx="10" fill="#fff" stroke="#94a3b8"/>
      <text x="1010" y="462" text-anchor="middle" font-weight="700">BusinessMonitor</text>
      <text x="1010" y="484" text-anchor="middle" font-size="12" fill="#64748b">Snapshot v1 · 6 panels · 5s LRU</text>
    </g>
  </g>

  <g stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="170" y1="170" x2="380" y2="208"/>
    <line x1="415" y1="170" x2="500" y2="208"/>
    <line x1="660" y1="170" x2="650" y2="208"/>
    <line x1="967" y1="170" x2="800" y2="208"/>

    <line x1="220" y1="266" x2="220" y2="305"/>
    <line x1="570" y1="266" x2="570" y2="305"/>
    <line x1="950" y1="266" x2="950" y2="305"/>

    <line x1="220" y1="395" x2="180" y2="425"/>
    <line x1="570" y1="395" x2="440" y2="425"/>
    <line x1="570" y1="395" x2="720" y2="425"/>
    <line x1="950" y1="395" x2="1010" y2="425"/>
  </g>

  <text x="600" y="600" text-anchor="middle" fill="#475569" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14">同一分身：shared 模式与 per_user 模式可共存切换 · 全链路携带 instanceUserId</text>
</svg>
